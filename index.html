<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar & Tasks</title>
<style>
/* ═══════════════════════════════════════════
   iOS-INSPIRED DESIGN SYSTEM
   Palette: #FF3B30 red · #007AFF blue · #34C759 green
            #FF9500 orange · #AF52DE purple · #8E8E93 gray
   ═══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #F2F2F7;
  height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid rgba(60,60,67,0.2);
  padding: 11px 20px;
  display: flex;
  align-items: center;
}
.header h1 {
  font-size: .95rem;
  font-weight: 700;
  color: #1C1C1E;
  letter-spacing: -0.2px;
}

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── CALENDAR PANEL ── */
.cal-side {
  background: #fff;
  border-right: 0.5px solid rgba(60,60,67,0.15);
  width: 380px;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Nav bar */
.cal-nav {
  display: flex;
  align-items: center;
  padding: 14px 14px 6px;
  gap: 4px;
}
.cal-nav button {
  background: none;
  border: none;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.15rem;
  color: #007AFF;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .12s;
}
.cal-nav button:hover { background: rgba(0,122,255,0.1); }
.cal-nav .nav-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.cal-nav .month-label {
  font-size: 1rem;
  font-weight: 700;
  color: #1C1C1E;
  letter-spacing: -0.3px;
}

/* Today button — iOS pill */
.today-btn {
  background: rgba(0,122,255,0.1);
  border: none;
  border-radius: 20px;
  padding: 4px 13px;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
  color: #007AFF;
  font-family: inherit;
  transition: background .12s;
}
.today-btn:hover { background: rgba(0,122,255,0.18); }

/* Calendar grid */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 6px 10px;
  overflow-y: auto;
  align-content: start;
}
.dow {
  text-align: center;
  font-size: .65rem;
  font-weight: 600;
  color: #8E8E93;
  padding: 4px 0 8px;
  letter-spacing: .4px;
  text-transform: uppercase;
}
.dow:first-child { color: #FF3B30; }
.dow:last-child  { color: #007AFF; }

/* Day cell */
.day {
  padding: 3px 2px 8px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  position: relative;
  border-radius: 10px;
  transition: background .1s;
  min-height: 54px;
}
.day:hover { background: rgba(0,0,0,0.04); }
.day.other { opacity: .25; pointer-events: none; }

/* Day number — circle */
.day .num {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .88rem;
  font-weight: 400;
  color: #1C1C1E;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.day.sunday  .num { color: #FF3B30; }
.day.saturday .num { color: #007AFF; }
/* Today = red circle */
.day.today .num {
  background: #FF3B30;
  color: #fff !important;
  font-weight: 700;
}
/* Selected = blue circle (overrides today) */
.day.selected .num {
  background: #007AFF !important;
  color: #fff !important;
  font-weight: 600;
}

/* Lunar date */
.day .lun {
  font-size: .57rem;
  color: #8E8E93;
  line-height: 1;
}
.day.sunday .lun { color: rgba(255,59,48,.55); }

/* Holiday text */
.day .hol {
  font-size: .5rem;
  color: #FF3B30;
  line-height: 1.2;
  width: 100%;
  text-align: center;
  word-break: break-word;
  white-space: normal;
}

/* Calendar note on cell */
.day .cal-note-txt {
  font-size: .48rem;
  color: #AF52DE;
  line-height: 1.2;
  width: 100%;
  text-align: center;
  word-break: break-word;
  white-space: normal;
}

/* Task status — tô màu cả ô để dễ nhận biết trong tháng */
.day.has-done    { background: rgba(52,199,89,.14); }
.day.has-partial { background: rgba(255,149,0,.13); }
/* Khi selected: ưu tiên màu selected, giữ nguyên màu chữ (không đổi trắng) */
.day.selected { background: rgba(0,122,255,.07) !important; }

/* ── RESIZE HANDLE ── */
.resize-handle {
  width: 5px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
}
.resize-handle::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 3px; height: 36px;
  border-radius: 3px;
  background: #D1D1D6;
  transition: background .15s, height .15s;
}
.resize-handle:hover::after,
.resize-handle.active::after { background: #007AFF; height: 56px; }

/* ── TASK PANEL ── */
.note-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #F8F8FA;
  padding: 16px 16px 12px;
  gap: 11px;
}

.note-header {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 2px 4px;
}
.note-header .date-big {
  font-size: 1.2rem;
  font-weight: 700;
  color: #1C1C1E;
  letter-spacing: -0.5px;
}
.note-header .date-sub { display: none; }
.note-header .hol-badge {
  background: rgba(255,59,48,.1);
  color: #FF3B30;
  border: none;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: .7rem;
  font-weight: 600;
}

/* Note actions */
.note-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.move-btn {
  background: rgba(0,122,255,0.09);
  border: none;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: .73rem;
  font-weight: 600;
  cursor: pointer;
  color: #007AFF;
  font-family: inherit;
  transition: background .12s;
  white-space: nowrap;
}
.move-btn:hover { background: rgba(0,122,255,0.16); }

/* Calendar note input */
.cal-note-row input {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 9px 14px;
  font-size: .83rem;
  font-family: inherit;
  outline: none;
  background: #fff;
  color: #3C3C43;
  box-shadow: 0 1px 3px rgba(0,0,0,.07);
}
.cal-note-row input:focus { box-shadow: 0 0 0 3px rgba(0,122,255,.15); }
.cal-note-row input::placeholder { color: #AEAEB2; }

/* Add task row */
.add-row { display: flex; gap: 8px; }
.add-row input {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: .88rem;
  font-family: inherit;
  outline: none;
  background: #fff;
  color: #1C1C1E;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 0 rgba(0,122,255,0);
  transition: box-shadow .15s;
}
.add-row input::placeholder { color: #C7C7CC; }
.add-row input:focus { box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 3px rgba(0,122,255,.18); }
.add-row button {
  background: #007AFF;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 10px 18px;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, transform .08s;
}
.add-row button:hover  { background: #0062CC; }
.add-row button:active { transform: scale(.96); }

/* ── TASK LIST — iOS grouped card ── */
.todo-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
  padding: 2px 0;
}

/* Task wrapper: separator between groups */
.task-wrapper {
  display: flex;
  flex-direction: column;
}

/* Main task row */
.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  border: none;
  padding: 10px 14px 10px 12px;
  transition: background .1s;
  cursor: default;
  user-select: none;
  position: relative;
}
/* Hairline separator below each item (iOS style) */
.todo-item::after {
  content: '';
  position: absolute;
  bottom: 0; left: 54px; right: 0;
  height: 0.5px;
  background: rgba(60,60,67,0.1);
}
.todo-item:hover { background: rgba(0,0,0,0.02); }
.todo-item.drag-over { background: rgba(0,122,255,.05); outline: none; }
.todo-item.dragging  { opacity: .35; }
.todo-item.done .todo-num { color: #C7C7CC; }

/* Custom circular iOS checkbox */
input[type=checkbox] {
  appearance: none;
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid #C7C7CC;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: border-color .15s, background .15s;
  background: transparent;
}
input[type=checkbox]:checked {
  background: #34C759;
  border-color: #34C759;
}
input[type=checkbox]:checked::after {
  content: '';
  position: absolute;
  left: 6px; top: 3px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(43deg);
}

/* Drag handle */
.drag-handle {
  color: #D1D1D6;
  cursor: grab;
  font-size: 1rem;
  padding: 0 2px;
  flex-shrink: 0;
  line-height: 1;
  user-select: none;
}
.drag-handle:active { cursor: grabbing; }
.todo-item:hover .drag-handle { color: #8E8E93; }

/* Expand chevron */
.expand-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #8E8E93;
  font-size: .62rem;
  padding: 0 2px;
  flex-shrink: 0;
  width: 14px;
  text-align: center;
  line-height: 1;
  transition: color .12s;
  font-family: inherit;
}
.expand-btn:hover { color: #007AFF; }
.expand-btn.hidden { opacity: 0; pointer-events: none; }

/* Task number */
.todo-num {
  font-size: .7rem;
  font-weight: 600;
  color: #8E8E93;
  min-width: 16px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.3px;
}

/* Task text */
.todo-item .txt {
  flex: 1;
  font-size: .9rem;
  color: #1C1C1E;
  word-break: break-word;
  line-height: 1.4;
  letter-spacing: -0.1px;
}
.todo-item.done .txt { text-decoration: line-through; color: #8E8E93; }

/* Inline edit */
.todo-item .edit-input,
.sub-item  .edit-input {
  flex: 1;
  border: none;
  border-radius: 8px;
  padding: 3px 8px;
  font-size: .88rem;
  font-family: inherit;
  outline: none;
  background: rgba(0,122,255,.07);
  color: #1C1C1E;
}

/* Action icon buttons */
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #C7C7CC;
  font-size: .8rem;
  padding: 3px 5px;
  border-radius: 6px;
  line-height: 1;
  opacity: 0;
  transition: opacity .12s, color .1s, background .1s;
  flex-shrink: 0;
  font-family: inherit;
}
.todo-item:hover .icon-btn { opacity: 1; }
.sub-item:hover  .icon-btn { opacity: 1; }
.icon-btn.edit-btn:hover  { color: #007AFF; background: rgba(0,122,255,.1); }
.icon-btn.save-btn        { opacity: 1; color: #34C759; }
.icon-btn.save-btn:hover  { background: rgba(52,199,89,.1); }
.icon-btn.del-btn:hover   { color: #FF3B30; background: rgba(255,59,48,.1); }
.icon-btn.add-sub-btn:hover { color: #007AFF; background: rgba(0,122,255,.1); }

/* ── SUB-TASKS ── */
.sub-tasks {
  margin: 0 0 2px 48px;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-left: 2px solid #E5E5EA;
  padding-left: 10px;
}
.sub-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  border: none;
  border-radius: 6px;
  padding: 5px 6px;
  transition: background .1s;
  user-select: none;
}
.sub-item:hover { background: #F2F2F7; }
.sub-item.drag-over { background: rgba(0,122,255,.07); outline: 1px dashed rgba(0,122,255,.3); border-radius: 6px; }
.sub-item:hover .icon-btn { opacity: 1; }
.sub-item.done .txt  { text-decoration: line-through; color: #8E8E93; }
.sub-item.done .sub-num { color: #C7C7CC; }
.sub-item.dragging { opacity: .35; }

/* Sub checkbox — smaller, same green */
.sub-item input[type=checkbox] {
  width: 17px; height: 17px;
}
.sub-item input[type=checkbox]:checked {
  background: #34C759;
  border-color: #34C759;
}
.sub-item input[type=checkbox]:checked::after {
  left: 5px; top: 2px;
  width: 4px; height: 8px;
}

.sub-num {
  font-size: .67rem;
  font-weight: 600;
  color: #8E8E93;
  min-width: 20px;
  flex-shrink: 0;
  letter-spacing: -.2px;
}
.sub-drag-handle {
  color: #D1D1D6;
  cursor: grab;
  font-size: .82rem;
  flex-shrink: 0;
  user-select: none;
  padding: 0 2px;
}
.sub-item:hover .sub-drag-handle { color: #8E8E93; }
.sub-item .txt {
  font-size: .85rem;
  flex: 1;
  word-break: break-word;
  color: #3C3C43;
  letter-spacing: -.1px;
}

/* Add sub-task row */
.add-sub-row {
  display: flex;
  gap: 6px;
  margin-top: 3px;
  margin-bottom: 4px;
  padding-left: 2px;
}
.add-sub-row input {
  flex: 1;
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: .8rem;
  font-family: inherit;
  outline: none;
  background: #F2F2F7;
  color: #3C3C43;
}
.add-sub-row input::placeholder { color: #AEAEB2; }
.add-sub-row input:focus { background: #E5E5EA; }
.add-sub-row button {
  background: #E5E5EA;
  border: none;
  border-radius: 8px;
  padding: 5px 11px;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
  color: #3C3C43;
  font-family: inherit;
  transition: background .12s;
}
.add-sub-row button:hover { background: #D1D1D6; }

/* ── DROP ZONES ── */
.dz {
  display: flex;
  align-items: center;
  height: 3px;
  margin: 0;
  cursor: default;
  transition: height .12s, margin .12s;
}
#todoList.drag-active .dz { height: 18px; margin: 1px 0; }
.dz-line {
  flex: 1;
  height: 2px;
  border-radius: 2px;
  background: transparent;
  transition: background .1s, height .1s;
}
#todoList.drag-active .dz-main     .dz-line { background: rgba(0,122,255,.18); }
#todoList.drag-active .dz-sub      .dz-line { background: rgba(0,122,255,.12); }
#todoList.drag-active .dz-sub-item .dz-line { background: rgba(0,122,255,.10); }
.dz.over .dz-line                { background: #007AFF !important; height: 3px; }
.dz-sub.over .dz-line            { background: #007AFF !important; }
.dz-sub-item.over .dz-line       { background: #007AFF !important; }
.dz-sub { margin-left: 44px; }

/* Empty state */
.empty {
  text-align: center;
  color: #8E8E93;
  font-size: .88rem;
  padding: 44px 0;
  letter-spacing: -.1px;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 18px;
  padding: 24px;
  min-width: 300px;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.modal-title { font-weight: 700; font-size: 1rem; color: #1C1C1E; letter-spacing: -.3px; }
.modal-sub   { font-size: .82rem; color: #8E8E93; }
.modal-box input[type=date] {
  width: 100%;
  border: 1.5px solid #E5E5EA;
  border-radius: 12px;
  padding: 10px 13px;
  font-size: .9rem;
  font-family: inherit;
  outline: none;
  color: #1C1C1E;
}
.modal-box input[type=date]:focus { border-color: #007AFF; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button {
  border: none;
  border-radius: 12px;
  padding: 9px 16px;
  font-size: .85rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s;
}
.btn-cancel { background: #F2F2F7; color: #3C3C43; }
.btn-cancel:hover { background: #E5E5EA; }
.btn-copy { background: rgba(0,122,255,.1); color: #007AFF; }
.btn-copy:hover { background: rgba(0,122,255,.18); }
.btn-move { background: #007AFF; color: #fff; }
.btn-move:hover { background: #0062CC; }

@media(max-width:700px) {
  .layout { flex-direction: column; }
  .cal-side { width: 100% !important; min-width: 0 !important; border-right: none; border-bottom: 0.5px solid rgba(60,60,67,.15); }
  .resize-handle { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Calendar &amp; Tasks</h1>
  <span style="margin-left:auto;font-size:.75rem;color:#8E8E93;letter-spacing:-.1px">📦 Local storage</span>
</div>

<div class="layout">
  <!-- CALENDAR -->
  <div class="cal-side">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="nav-center">
        <div class="month-label" id="monthLabel"></div>
        <button class="today-btn" onclick="goToday()">Today</button>
      </div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <!-- NOTE -->
  <div class="note-side">
    <div class="note-header">
      <div class="date-big" id="noteDateBig">Select a day</div>
      <div class="date-sub" id="noteDateSub"></div>
      <span class="hol-badge" id="noteHolBadge" style="display:none"></span>
      <div class="note-actions">
        <button class="move-btn" onclick="openMoveModal()">📋 Copy / ✂️ Move</button>
      </div>
    </div>

    <div class="cal-note-row">
      <input id="calNoteInput" placeholder="📌 Calendar note — birthday, reminder..." oninput="saveCalNote()">
    </div>

    <div class="add-row">
      <input id="taskInput" placeholder="Add a task…  [Enter] add  [Shift+Enter] add + sub-tasks">
      <button onclick="addTask()">+ Add</button>
    </div>

    <div class="todo-list" id="todoList"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  LUNAR CALENDAR (accurate algorithm)
// ══════════════════════════════════════════
const TZ = 7; // GMT+7

function jdFromDate(d, m, y) {
  var a = Math.floor((14 - m) / 12);
  var yr = y + 4800 - a;
  var mo = m + 12 * a - 3;
  var jd = d + Math.floor((153 * mo + 2) / 5) + 365 * yr + Math.floor(yr / 4) - Math.floor(yr / 100) + Math.floor(yr / 400) - 32045;
  if (jd < 2299161) jd = d + Math.floor((153 * mo + 2) / 5) + 365 * yr + Math.floor(yr / 4) - 32083;
  return jd;
}

function getNewMoonDay(k) {
  var dr = Math.PI / 180;
  var T = k / 1236.85, T2 = T * T, T3 = T2 * T;
  var Jd1 = 2415020.75933 + 29.53058868 * k + 0.0001178 * T2 - 0.000000155 * T3;
  Jd1 += 0.00033 * Math.sin((166.56 + 132.87 * T - 0.009173 * T2) * dr);
  var M   = 359.2242  + 29.10535608 * k - 0.0000333 * T2 - 0.00000347 * T3;
  var Mpr = 306.0253  + 385.81691806 * k + 0.0107306 * T2 + 0.00001236 * T3;
  var F   = 21.2964   + 390.67050646 * k - 0.0016528 * T2 - 0.00000239 * T3;
  var C1  = (0.1734 - 0.000393 * T) * Math.sin(M * dr) + 0.0021 * Math.sin(2 * dr * M);
  C1 -= 0.4068 * Math.sin(Mpr * dr) + 0.0161 * Math.sin(dr * 2 * Mpr) - 0.0004 * Math.sin(dr * 3 * Mpr);
  C1 += 0.0104 * Math.sin(dr * 2 * F) - 0.0051 * Math.sin(dr * (M + Mpr));
  C1 -= 0.0074 * Math.sin(dr * (M - Mpr)) + 0.0004 * Math.sin(dr * (2 * F + M));
  C1 -= 0.0004 * Math.sin(dr * (2 * F - M)) - 0.0006 * Math.sin(dr * (2 * F + Mpr));
  C1 += 0.0010 * Math.sin(dr * (2 * F - Mpr)) + 0.0005 * Math.sin(dr * (2 * Mpr + M));
  var deltat = T < -11
    ? 0.001 + 0.000839 * T + 0.0002261 * T2 - 0.00000845 * T3 - 0.000000081 * T * T3
    : -0.000278 + 0.000265 * T + 0.000262 * T2;
  return Math.floor(Jd1 + C1 - deltat + 0.5 + TZ / 24);
}

function getSunLong(jdn) {
  var dr = Math.PI / 180;
  var T = (jdn - 2451545.5 - TZ / 24) / 36525, T2 = T * T;
  var M  = 357.52910 + 35999.05030 * T - 0.0001559 * T2 - 0.00000048 * T * T2;
  var L0 = 280.46645 + 36000.76983 * T + 0.0003032 * T2;
  var DL = (1.9146 - 0.004817 * T - 0.000014 * T2) * Math.sin(dr * M)
         + (0.019993 - 0.000101 * T) * Math.sin(dr * 2 * M)
         + 0.00029 * Math.sin(dr * 3 * M);
  var L = L0 + DL;
  var omega = 125.04 - 1934.136 * T;
  L = (L - 0.00569 - 0.00478 * Math.sin(omega * dr)) * dr;
  L -= Math.PI * 2 * Math.floor(L / (Math.PI * 2));
  return Math.floor(L / Math.PI * 6);
}

function getLunarMonth11(y) {
  var off = jdFromDate(31, 12, y) - 2415021;
  var k = Math.floor(off / 29.530588853);
  var nm = getNewMoonDay(k);
  if (getSunLong(nm) >= 9) nm = getNewMoonDay(k - 1);
  return nm;
}

function getLeapOff(a11) {
  var k = Math.floor((a11 - 2415021.076998695) / 29.530588853 + 0.5);
  var i = 1, arc = getSunLong(getNewMoonDay(k + i)), last;
  do { last = arc; i++; arc = getSunLong(getNewMoonDay(k + i)); } while (arc != last && i < 14);
  return i - 1;
}

function solar2lunar(d, m, y) {
  var jd = jdFromDate(d, m, y);
  var k  = Math.floor((jd - 2415021.076998695) / 29.530588853);
  var ms = getNewMoonDay(k + 1);
  if (ms > jd) ms = getNewMoonDay(k);
  var a11 = getLunarMonth11(y);
  var b11 = a11;
  var ly;
  if (a11 >= ms) { ly = y; a11 = getLunarMonth11(y - 1); }
  else           { ly = y + 1; b11 = getLunarMonth11(y + 1); }
  var ld   = jd - ms + 1;
  var diff = Math.floor((ms - a11) / 29);
  var lm   = diff + 11;
  var leap = false;
  if (b11 - a11 > 365) {
    var lo = getLeapOff(a11);
    if (diff >= lo) { lm = diff + 10; if (diff == lo) leap = true; }
  }
  if (lm > 12) lm -= 12;
  if (lm >= 11 && diff < 4) ly--;
  return { d: ld, m: lm, y: ly, leap };
}

// Solar: "MM-DD"
const SOL_HOL = {
  '01-01': 'Tết Dương lịch',
  '02-14': 'Valentine',
  '03-08': 'Quốc tế Phụ nữ',
  '04-30': 'Giải phóng miền Nam',
  '05-01': 'Quốc tế Lao động',
  '05-19': 'Sinh nhật Bác Hồ',
  '06-01': 'Quốc tế Thiếu nhi',
  '09-02': 'Quốc khánh',
  '10-20': 'Phụ nữ Việt Nam',
  '10-31': 'Halloween',
  '11-20': 'Ngày Nhà giáo',
  '12-25': 'Giáng sinh',
};
// Lunar: "MM-DD"
const LUN_HOL = {
  '01-01': 'Tết Nguyên Đán',
  '01-02': 'Mùng 2 Tết',
  '01-03': 'Mùng 3 Tết',
  '01-15': 'Rằm tháng Giêng',
  '03-10': 'Giỗ Tổ Hùng Vương',
  '04-15': 'Phật Đản',
  '07-15': 'Lễ Vu Lan',
  '08-15': 'Tết Trung Thu',
  '12-23': 'Ông Táo về trời',
  '12-30': 'Tất niên',
};

function getHols(y, m, d) {
  const list = [];
  const sk = String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
  if (SOL_HOL[sk]) list.push(SOL_HOL[sk]);
  const l = solar2lunar(d, m, y);
  const lk = String(l.m).padStart(2,'0') + '-' + String(l.d).padStart(2,'0');
  if (LUN_HOL[lk]) list.push(LUN_HOL[lk]);
  return list;
}

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let curY = TODAY.getFullYear(), curM = TODAY.getMonth() + 1;
let selY = curY, selM = curM, selD = TODAY.getDate();

function key(y,m,d) { return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function load() { return JSON.parse(localStorage.getItem('_cal_') || '{}'); }
function save(data) {
  localStorage.setItem('_cal_', JSON.stringify(data));
}
function loadNotes() { return JSON.parse(localStorage.getItem('_cal_notes_') || '{}'); }
function saveCalNote() {
  const k = key(selY, selM, selD);
  const notes = loadNotes();
  const val = document.getElementById('calNoteInput').value.trim();
  if (val) notes[k] = val; else delete notes[k];
  localStorage.setItem('_cal_notes_', JSON.stringify(notes));
  renderCal();
}

// ══════════════════════════════════════════
//  RENDER CALENDAR
// ══════════════════════════════════════════
function changeMonth(delta) {
  curM += delta;
  if (curM > 12) { curM = 1; curY++; }
  if (curM < 1)  { curM = 12; curY--; }
  renderCal();
}

function renderCal() {
  const MN = ['January','February','March','April','May','June',
              'July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent = MN[curM-1] + ' ' + curY;

  const g = document.getElementById('calGrid');
  g.innerHTML = '';

  // Day-of-week headers
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(label => {
    const el = document.createElement('div');
    el.className = 'dow';
    el.textContent = label;
    g.appendChild(el);
  });

  const data = load();
  const calNotes = loadNotes();
  const firstDow = new Date(curY, curM-1, 1).getDay();
  const daysInMonth = new Date(curY, curM, 0).getDate();
  const daysInPrev  = new Date(curY, curM-1, 0).getDate();

  function makeCell(y, m, d, other) {
    const el = document.createElement('div');
    el.className = 'day' + (other ? ' other' : '');
    const dow = new Date(y, m-1, d).getDay();
    if (dow === 0) el.classList.add('sunday');
    if (dow === 6) el.classList.add('saturday');
    const isToday = (y === TODAY.getFullYear() && m === TODAY.getMonth()+1 && d === TODAY.getDate());
    if (isToday) el.classList.add('today');
    if (y === selY && m === selM && d === selD) el.classList.add('selected');

    // Lunar
    const l = solar2lunar(d, m, y);
    const lunStr = l.d + '/' + l.m + (l.leap ? 'n' : '');

    // Holidays
    const hols = getHols(y, m, d);

    const k = key(y, m, d);
    const tasks = data[k] || [];
    const total = tasks.length;
    const doneCount = tasks.filter(t => t.done).length;
    if (total > 0) el.classList.add(doneCount === total ? 'has-done' : 'has-partial');

    const calNote = calNotes[k] || '';

    el.innerHTML =
      '<div class="num">' + d + '</div>' +
      '<div class="lun">' + lunStr + '</div>' +
      (hols.length ? '<div class="hol">' + hols[0] + '</div>' : '') +
      (calNote ? '<div class="cal-note-txt">📌 ' + esc(calNote) + '</div>' : '');

    el.onclick = () => selectDay(y, m, d);
    return el;
  }

  // Prev month padding
  for (let i = firstDow - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const m = curM - 1 || 12;
    const y = curM - 1 ? curY : curY - 1;
    g.appendChild(makeCell(y, m, d, true));
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    g.appendChild(makeCell(curY, curM, d, false));
  }
  // Next month padding
  const total = firstDow + daysInMonth;
  const remain = (7 - total % 7) % 7;
  for (let d = 1; d <= remain; d++) {
    const m = curM + 1 > 12 ? 1 : curM + 1;
    const y = curM + 1 > 12 ? curY + 1 : curY;
    g.appendChild(makeCell(y, m, d, true));
  }
}

// Tự động mở rộng tất cả task có sub-tasks của ngày đang chọn
function autoExpandAll(y, m, d) {
  const data = load();
  const k = key(y, m, d);
  (data[k] || []).forEach(t => {
    if (t.subtasks && t.subtasks.length > 0) expandedTasks.add(t.id);
  });
}

function selectDay(y, m, d) {
  selY = y; selM = m; selD = d;
  autoExpandAll(y, m, d);
  renderCal();
  renderNote();
}

const WDAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function renderNote() {
  const dow = new Date(selY, selM-1, selD).getDay();
  const hols = getHols(selY, selM, selD);

  document.getElementById('noteDateBig').textContent =
    WDAY[dow] + ', ' + selD + '/' + selM + '/' + selY;

function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  const data = load();
  const k = key(selY, selM, selD);
  if (!data[k]) data[k] = [];
  const newId = Date.now();
  const newTask = { id: newId, text, done: false, subtasks: [] };
  if (insertAfterIdx !== null && insertAfterIdx < data[k].length) {
    data[k].splice(insertAfterIdx + 1, 0, newTask); // chèn sau vị trí đã chọn
  } else {
    data[k].push(newTask); // mặc định: thêm cuối
  }
  insertAfterIdx = null; // reset sau khi dùng
  save(data);
  inp.value = '';
  renderTodos();
  renderCal();

  setTimeout(() => {
    const newDiv = document.querySelector(`.todo-item[data-id="${newId}"]`);

}

function toggleTask(k, id) {
  const data = load();
  const t = data[k] && data[k].find(t => t.id === id);
  if (t) t.done = !t.done;
  save(data);
  renderTodos();
}

function deleteTask(k, id) {
  const data = load();
  if (!data[k]) return;
  pushUndo(k, data[k]); // snapshot trước khi xóa
  data[k] = data[k].filter(t => t.id !== id);
  save(data);
  renderTodos();
  renderCal();
}

function startEdit(k, id) {
  const data = load();
  const t = data[k] && data[k].find(t => t.id === id);
  if (!t) return;
  // Replace text span with input inline
  const el = document.getElementById('todoList');
  const items = el.querySelectorAll('.todo-item');
  items.forEach(div => {
    if (div.dataset.id == id) {
      const inp = document.createElement('input');
      inp.className = 'edit-input';
      inp.value = t.text;
      inp.onkeydown = e => {
        if (e.key === 'Enter') saveEdit(k, id, inp.value);
        if (e.key === 'Escape') renderTodos();
      };
      const txtSpan = div.querySelector('.txt');
      div.replaceChild(inp, txtSpan);
      // Swap edit→save button
      const editBtn = div.querySelector('.edit-btn');
      if (editBtn) {
        editBtn.textContent = '✓';
        editBtn.className = 'icon-btn save-btn';
        editBtn.onclick = () => saveEdit(k, id, inp.value);
      }
      inp.focus();
      inp.select();
    }
  });
}

function saveEdit(k, id, newText) {
  const text = newText.trim();
  if (!text) return;
  const data = load();
  const t = data[k] && data[k].find(t => t.id === id);
  if (t) t.text = text;
  save(data);
  renderTodos();
}

// ── DRAG & DROP + SUB-TASKS ──
let dragSrc = null; // {type:'main',idx} or {type:'sub',parentId,subIdx}
const expandedTasks = new Set();

// null = append to end; number = insert after this index
let insertAfterIdx = null;

// ── UNDO STACK ──
const undoStack = []; // [{dateKey, tasks}]
const MAX_UNDO = 30;

function pushUndo(dateKey, currentTasks) {
  undoStack.push({ dateKey, tasks: JSON.parse(JSON.stringify(currentTasks)) });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undoLast() {
  if (!undoStack.length) return;
  const { dateKey, tasks } = undoStack.pop();
  const data = load();
  if (tasks.length === 0) delete data[dateKey];
  else data[dateKey] = tasks;
  localStorage.setItem('_cal_', JSON.stringify(data));
  renderCal();
  if (dateKey === key(selY, selM, selD)) renderTodos();
}

// Robust focus: retry mỗi frame tối đa 30 lần (~500ms) cho đến khi element xuất hiện và được focus
function focusByIdRetry(id, attempts) {
  if (attempts === undefined) attempts = 30;
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ block: 'nearest' });
    el.focus();
    if (document.activeElement === el) return; // confirmed
  }
  if (attempts > 0) {
    setTimeout(() => focusByIdRetry(id, attempts - 1), 16);
  }
}

function addSubTask(k, taskId) {

  t.subtasks.push({ id: Date.now(), text, done: false });

function toggleSubTask(k, taskId, subId) {
  const data = load();
  const t = data[k] && data[k].find(t => t.id === taskId);
  if (!t || !t.subtasks) return;
  const sub = t.subtasks.find(s => s.id === subId);
  if (sub) sub.done = !sub.done;
  // Auto-sync parent: done when ALL subs done; un-done when any sub un-done
  if (t.subtasks.length > 0) {
    t.done = t.subtasks.every(s => s.done);
  }
  save(data);
  renderTodos();
  renderCal();
}

function deleteSubTask(k, taskId, subId) {
  const data = load();
  const t = data[k] && data[k].find(t => t.id === taskId);
  if (!t || !t.subtasks) return;
  pushUndo(k, data[k]); // snapshot trước khi xóa
  t.subtasks = t.subtasks.filter(s => s.id !== subId);
  save(data);
  renderTodos();
}

function startEditSub(k, taskId, subId) {
  const data = load();
  const t = data[k] && data[k].find(t => t.id === taskId);
  if (!t || !t.subtasks) return;
  const sub = t.subtasks.find(s => s.id === subId);
  if (!sub) return;
  const subEl = document.querySelector(`.sub-item[data-sid="${subId}"]`);
  if (!subEl) return;
  const inp = document.createElement('input');
  inp.className = 'edit-input';
  inp.value = sub.text;
  inp.onkeydown = e => {
    if (e.key === 'Enter') saveEditSub(k, taskId, subId, inp.value);
    if (e.key === 'Escape') renderTodos();
  };
  subEl.replaceChild(inp, subEl.querySelector('.txt'));
  const eb = subEl.querySelector('.edit-btn');
  if (eb) { eb.textContent = '✓'; eb.className = 'icon-btn save-btn'; eb.onclick = () => saveEditSub(k, taskId, subId, inp.value); }
  inp.focus(); inp.select();
}

function saveEditSub(k, taskId, subId, newText) {
  const text = newText.trim();
  if (!text) return;
  const data = load();
  const t = data[k] && data[k].find(t => t.id === taskId);
  if (t && t.subtasks) { const sub = t.subtasks.find(s => s.id === subId); if (sub) sub.text = text; }
  save(data);
  renderTodos();
}

// ── Helpers: create drop zone dividers ──
function makeDZ(cls, onDrop) {
  const dz = document.createElement('div');
  dz.className = 'dz ' + cls;
  const line = document.createElement('div');
  line.className = 'dz-line';
  dz.appendChild(line);
  dz.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); dz.classList.remove('over'); onDrop(); });
  return dz;
}

function finishDrag() {
  dragSrc = null;
  document.getElementById('todoList').classList.remove('drag-active');
}

function renderTodos() {
  const k = key(selY, selM, selD);
  const data = load();
  const tasks = data[k] || [];
  const el = document.getElementById('todoList');
  el.innerHTML = '';

  if (!tasks.length) {
    el.innerHTML = '<div class="empty">No tasks for this day yet</div>';
    return;
  }

  // Helper: insert item as main task at position insertIdx
  function dropAsMain(insertIdx) {
    const d2 = load(); const arr = d2[k];
    let item;
    if (dragSrc.type === 'main') {
      const srcIdx = arr.findIndex(t => t.id === dragSrc.id);
      if (srcIdx === -1) return;
      [item] = arr.splice(srcIdx, 1);
      if (insertIdx > srcIdx) insertIdx--;
    } else { // sub
      const parent = arr.find(t => t.id === dragSrc.parentId);
      if (!parent) return;
      const si = parent.subtasks.findIndex(s => s.id === dragSrc.subId);
      if (si === -1) return;
      const [sub] = parent.subtasks.splice(si, 1);
      item = { id: Date.now(), text: sub.text, done: sub.done, subtasks: [] };
    }
    arr.splice(insertIdx, 0, item);
    save(d2); finishDrag(); renderTodos(); renderCal();
  }

  // Helper: insert item as sub-task of parentId at specific position (insertSubIdx)
  // Pass insertSubIdx = -1 to append at end
  function dropAsSubAt(parentId, insertSubIdx) {
    const d2 = load(); const arr = d2[k];
    const parent = arr.find(t => t.id === parentId);
    if (!parent) return;
    if (!parent.subtasks) parent.subtasks = [];

    if (dragSrc.type === 'main') {
      const srcIdx = arr.findIndex(t => t.id === dragSrc.id);
      if (srcIdx === -1 || arr[srcIdx].id === parentId) return; // can't nest itself
      const [task] = arr.splice(srcIdx, 1);
      // bring its own sub-tasks along as siblings
      const toInsert = [{ id: Date.now(), text: task.text, done: task.done }];
      (task.subtasks || []).forEach((s, i) =>
        toInsert.push({ id: Date.now() + i + 1, text: s.text, done: s.done }));
      const at = insertSubIdx < 0 ? parent.subtasks.length : insertSubIdx;
      parent.subtasks.splice(at, 0, ...toInsert);
    } else { // sub → sub
      const isSame = dragSrc.parentId === parentId;
      const srcParent = isSame ? parent : arr.find(t => t.id === dragSrc.parentId);
      if (!srcParent) return;
      const si = srcParent.subtasks.findIndex(s => s.id === dragSrc.subId);
      if (si === -1) return;
      const [sub] = srcParent.subtasks.splice(si, 1);
      let at = insertSubIdx < 0 ? parent.subtasks.length : insertSubIdx;
      if (isSame && at > si) at--; // adjust for removed element
      parent.subtasks.splice(at, 0, sub);
    }

    expandedTasks.add(parentId);
    save(d2); finishDrag(); renderTodos(); renderCal();
  }

  // Drop zone BEFORE first task
  el.appendChild(makeDZ('dz-main', () => dropAsMain(0)));

  tasks.forEach((t, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'task-wrapper';

    // ── Main row ──
    const div = document.createElement('div');
    div.className = 'todo-item' + (t.done ? ' done' : '');
    div.dataset.id = t.id;
    div.dataset.idx = idx;
    div.draggable = true;

    const hasSubs = t.subtasks && t.subtasks.length > 0;
    const isExpanded = expandedTasks.has(t.id);
    const showExp = hasSubs || isExpanded;

    const handle = document.createElement('span');
    handle.className = 'drag-handle'; handle.textContent = '⠿';

    const expBtn = document.createElement('button');
    expBtn.className = 'expand-btn' + (showExp ? '' : ' hidden');
    expBtn.textContent = isExpanded ? '▾' : '▸';
    expBtn.title = isExpanded ? 'Collapse' : 'Expand sub-tasks';
    expBtn.onclick = () => toggleExpand(t.id);

    const num = document.createElement('span');
    num.className = 'todo-num'; num.textContent = (idx + 1) + '.';

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = t.done;
    cb.onchange = () => toggleTask(k, t.id);

    const txt = document.createElement('span');
    txt.className = 'txt'; txt.textContent = t.text;
    txt.ondblclick = () => startEdit(k, t.id);

    const editBtn = document.createElement('button');
    editBtn.className = 'icon-btn edit-btn'; editBtn.textContent = '✎';
    editBtn.onclick = () => startEdit(k, t.id);

    const addSubBtn = document.createElement('button');
    addSubBtn.className = 'icon-btn add-sub-btn'; addSubBtn.textContent = '⊕';
    addSubBtn.title = 'Add sub-task';
    addSubBtn.onclick = () => {
      expandedTasks.add(t.id); renderTodos();
      setTimeout(() => { const i = document.getElementById('subInp_' + t.id); if (i) i.focus(); }, 30);
    };

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn del-btn'; delBtn.textContent = '✕';
    delBtn.onclick = () => deleteTask(k, t.id);

    div.appendChild(handle); div.appendChild(expBtn); div.appendChild(num);
    div.appendChild(cb); div.appendChild(txt);
    div.appendChild(editBtn); div.appendChild(addSubBtn); div.appendChild(delBtn);

    // Main task drag events
    div.addEventListener('dragstart', e => {
      // Don't start drag if user clicked a button or checkbox
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') { e.preventDefault(); return; }
      dragSrc = { type: 'main', id: t.id, idx };
      div.classList.add('dragging');
      el.classList.add('drag-active');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(t.id));
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('dragging');
      el.classList.remove('drag-active');
      dragSrc = null;
    });
    // Allow dropping ONTO a main task item → insert after it (same as dz-main below it)
    div.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      div.classList.remove('drag-over');
      if (!dragSrc) return;
      dropAsMain(idx + 1); // insert after this task
    });

    wrapper.appendChild(div);

    // ── Sub-tasks ──
    if (isExpanded) {
      const subs = t.subtasks || [];
      const subCont = document.createElement('div');
      subCont.className = 'sub-tasks';

      // Drop zone BEFORE first sub-task
      subCont.appendChild(makeDZ('dz-sub-item', () => dropAsSubAt(t.id, 0)));

      subs.forEach((sub, si) => {
        const sd = document.createElement('div');
        sd.className = 'sub-item' + (sub.done ? ' done' : '');
        sd.dataset.sid = sub.id;
        sd.draggable = true;

        const sdHandle = document.createElement('span');
        sdHandle.className = 'sub-drag-handle'; sdHandle.textContent = '⠿';

        const sn = document.createElement('span'); sn.className = 'sub-num';
        sn.textContent = (idx + 1) + '.' + (si + 1);
        const sc = document.createElement('input'); sc.type = 'checkbox'; sc.checked = sub.done;
        sc.onchange = () => toggleSubTask(k, t.id, sub.id);
        const st = document.createElement('span'); st.className = 'txt'; st.textContent = sub.text;
        st.ondblclick = () => startEditSub(k, t.id, sub.id);
        const se = document.createElement('button'); se.className = 'icon-btn edit-btn'; se.textContent = '✎';
        se.onclick = () => startEditSub(k, t.id, sub.id);
        const sd2 = document.createElement('button'); sd2.className = 'icon-btn del-btn'; sd2.textContent = '✕';
        sd2.onclick = () => deleteSubTask(k, t.id, sub.id);

        sd.appendChild(sdHandle); sd.appendChild(sn); sd.appendChild(sc);
        sd.appendChild(st); sd.appendChild(se); sd.appendChild(sd2);

        // Sub-task drag events
        sd.addEventListener('dragstart', e => {
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') { e.preventDefault(); return; }
          dragSrc = { type: 'sub', parentId: t.id, subId: sub.id, subIdx: si };
          sd.classList.add('dragging');
          el.classList.add('drag-active');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', String(sub.id));
          e.stopPropagation();
        });
        sd.addEventListener('dragend', () => {
          sd.classList.remove('dragging');
          el.classList.remove('drag-active');
          dragSrc = null;
        });
        // Drop ON a sub-item → insert after it (same as dz-sub-item below it)
        sd.addEventListener('dragover', e => {
          e.preventDefault(); e.stopPropagation();
          e.dataTransfer.dropEffect = 'move';
          sd.classList.add('drag-over');
        });
        sd.addEventListener('dragleave', () => sd.classList.remove('drag-over'));
        sd.addEventListener('drop', e => {
          e.preventDefault(); e.stopPropagation();
          sd.classList.remove('drag-over');
          if (!dragSrc) return;
          dropAsSubAt(t.id, si + 1); // insert after this sub-task
        });

        // Keyboard navigation on focused sub-item
        sd.tabIndex = 0;
        sd.addEventListener('keydown', e => {
          if (e.target !== sd) return;
          if (e.key === 'Delete' || e.key === 'Backspace') {
            e.preventDefault();
            // Focus sang sub-item kề hoặc về parent trước khi xóa
            const allSubs = [...subCont.querySelectorAll('.sub-item')];
            const si2 = allSubs.indexOf(sd);
            if (si2 > 0) allSubs[si2 - 1].focus();
            else if (si2 < allSubs.length - 1) allSubs[si2 + 1].focus();
            else div.focus();
            deleteSubTask(k, t.id, sub.id);
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            const allSubs = [...subCont.querySelectorAll('.sub-item')];
            const si2 = allSubs.indexOf(sd);
            if (si2 < allSubs.length - 1) {
              allSubs[si2 + 1].focus(); // next sub-item
            } else {
              // Cuối danh sách sub → focus vào sub-input
              const subI = document.getElementById('subInp_' + t.id);
              if (subI) subI.focus();
            }
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            const allSubs = [...subCont.querySelectorAll('.sub-item')];
            const si2 = allSubs.indexOf(sd);
            if (si2 > 0) {
              allSubs[si2 - 1].focus(); // previous sub-item
            } else {
              div.focus(); // đầu danh sách sub → về parent task div
            }
          }
        });

        subCont.appendChild(sd);

        // Drop zone AFTER each sub-task
        subCont.appendChild(makeDZ('dz-sub-item', () => dropAsSubAt(t.id, si + 1)));
      });

      const addRow = document.createElement('div'); addRow.className = 'add-sub-row';
      const subInp = document.createElement('input');
      subInp.id = 'subInp_' + t.id; subInp.placeholder = 'Add sub-task...';
      subInp.onkeydown = e => {
        if (e.key === 'Enter' && !e.ctrlKey) {
          addSubTask(k, t.id);  // Enter: thêm sub-task, ở lại sub input
        } else if (e.key === 'Enter' && e.ctrlKey) {
          e.preventDefault();
          // Ctrl+Enter: trở về parent task div (không collapse sub-tasks)
          div.focus();
        } else if (e.key === 'Escape') {
          expandedTasks.delete(t.id); renderTodos();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          // Lên trên: sub-item cuối cùng, hoặc về parent task div nếu không có sub
          const allSubs = [...subCont.querySelectorAll('.sub-item')];
          if (allSubs.length > 0) allSubs[allSubs.length - 1].focus();
          else div.focus();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          // Xuống: sang main task kế tiếp
          const items = [...document.querySelectorAll('.todo-item')];
          const i = items.indexOf(div);
          if (i < items.length - 1) items[i + 1].focus();
        }
      };
      const subAddBtn = document.createElement('button'); subAddBtn.textContent = '+ Add';
      subAddBtn.onclick = () => addSubTask(k, t.id);
      addRow.appendChild(subInp); addRow.appendChild(subAddBtn);
      subCont.appendChild(addRow);
      wrapper.appendChild(subCont);
    }

    // Keyboard navigation on focused main task
    div.tabIndex = 0;
    div.addEventListener('keydown', e => {
      if (e.target !== div) return; // ignore events from inner inputs/buttons
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        // Nếu đang mở sub-tasks → đi vào sub-item đầu tiên
        if (isExpanded && hasSubs) {
          const firstSub = wrapper.querySelector('.sub-item');
          if (firstSub) { firstSub.focus(); return; }
        }
        // Nếu không có sub hoặc chưa mở → sang task chính kế tiếp
        const items = [...document.querySelectorAll('.todo-item')];
        const i = items.indexOf(div);
        if (i < items.length - 1) items[i + 1].focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const items = [...document.querySelectorAll('.todo-item')];
        const i = items.indexOf(div);
        if (i > 0) items[i - 1].focus();
        else document.getElementById('taskInput')?.focus();
      } else if (e.key === 'Delete' || e.key === 'Backspace') {
        // Delete/Backspace → xóa task đang focus (có undo bằng Ctrl+Z)
        e.preventDefault();
        const items = [...document.querySelectorAll('.todo-item')];
        const i = items.indexOf(div);
        // Focus sang task kề trước/sau trước khi xóa
        if (i > 0) items[i - 1].focus();
        else if (i < items.length - 1) items[i + 1].focus();
        else document.getElementById('taskInput')?.focus();
        deleteTask(k, t.id);
      } else if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
        // Enter → focus taskInput, task mới sẽ thêm vào cuối
        e.preventDefault();
        insertAfterIdx = null;
        document.getElementById('taskInput')?.focus();
      } else if (e.key === 'Enter' && e.ctrlKey && !e.shiftKey) {
        // Ctrl+Enter → focus taskInput, task mới sẽ chèn NGAY SAU task hiện tại
        e.preventDefault();
        insertAfterIdx = idx;
        const inp = document.getElementById('taskInput');
        if (inp) {
          inp.focus();
          inp.placeholder = `Insert after task ${idx + 1}… [Enter to confirm]`;
        }
      } else if (e.key === 'Enter' && e.shiftKey) {
        // Shift+Enter → mở sub-tasks + focus vào sub input
        e.preventDefault();
        expandedTasks.add(t.id);
        renderTodos();
        focusByIdRetry('subInp_' + t.id);
      }
    });

    // Drop zone: convert to sub-task of THIS task (append to end)
    wrapper.appendChild(makeDZ('dz-sub', () => dropAsSubAt(t.id, -1)));

    el.appendChild(wrapper);

    // Drop zone AFTER this task (= before next task)
    el.appendChild(makeDZ('dz-main', () => dropAsMain(idx + 1)));
  });
}

// ── MOVE / COPY ──
function openMoveModal() {
  const srcKey = key(selY, selM, selD);
  const data = load();
  const count = (data[srcKey] || []).length;
  if (!count) { alert('No tasks on this day to move or copy.'); return; }
  const WDAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dow = new Date(selY, selM-1, selD).getDay();
  document.getElementById('moveModalSub').textContent =
    count + ' task(s) from ' + WDAY[dow] + ' ' + selD + '/' + selM + '/' + selY;
  document.getElementById('moveTargetDate').value = key(selY, selM, selD);
  document.getElementById('moveModal').classList.add('open');
}
function closeMoveModal() {
  document.getElementById('moveModal').classList.remove('open');
}
function executeMoveOrCopy(mode) {
  const targetVal = document.getElementById('moveTargetDate').value;
  if (!targetVal) return;
  const srcKey = key(selY, selM, selD);
  if (targetVal === srcKey) { closeMoveModal(); return; }
  const data = load();
  const srcTasks = data[srcKey] || [];
  if (!srcTasks.length) { closeMoveModal(); return; }
  let uid = Date.now();
  const cloned = srcTasks.map(t => ({
    ...t, id: uid++,
    subtasks: (t.subtasks || []).map(s => ({ ...s, id: uid++ }))
  }));
  if (!data[targetVal]) data[targetVal] = [];
  data[targetVal] = [...data[targetVal], ...cloned];
  if (mode === 'move') {
    delete data[srcKey];
    const notes = loadNotes();
    if (notes[srcKey]) { notes[targetVal] = notes[srcKey]; delete notes[srcKey]; localStorage.setItem('_cal_notes_', JSON.stringify(notes)); }
  }
  save(data);
  closeMoveModal();
  renderCal();
  if (mode === 'move') {
    const parts = targetVal.split('-').map(Number);
    curY = parts[0]; curM = parts[1];
    selectDay(parts[0], parts[1], parts[2]);
  } else {
    renderTodos();
  }
}
// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.id === 'moveModal') closeMoveModal();
});

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
// ── RESIZE ──
(function initResize() {
  const handle  = document.getElementById('resizeHandle');
  const calSide = document.querySelector('.cal-side');
  const layout  = document.querySelector('.layout');
  let dragging  = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = calSide.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.style.cursor    = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newW  = Math.max(260, Math.min(560, startW + delta));
    calSide.style.width    = newW + 'px';
    calSide.style.minWidth = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });
})();

(function init() {
  autoExpandAll(selY, selM, selD); // mở rộng toàn bộ sub-tasks ngày đang chọn khi khởi động
  renderCal();
  renderNote();

  // Keyboard shortcuts on main task input
  const taskInp = document.getElementById('taskInput');
  const DEFAULT_PLACEHOLDER = taskInp.placeholder;
  taskInp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addTask(); // addTask() sẽ reset insertAfterIdx + placeholder
    } else if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      addTaskAndExpand();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      const f = document.querySelector('.todo-item');
      if (f) f.focus();
    } else if (e.key === 'Escape') {
      insertAfterIdx = null;
      taskInp.placeholder = DEFAULT_PLACEHOLDER;
    }
  });
  // Khi taskInput mất focus mà chưa add → reset chế độ chèn
  taskInp.addEventListener('blur', () => {
    insertAfterIdx = null;
    taskInp.placeholder = DEFAULT_PLACEHOLDER;
  });

  // Ctrl+Z / Cmd+Z → undo last delete
  // Ctrl+A / Cmd+A → toggle mở/đóng tất cả sub-tasks
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
      // Chỉ undo khi không đang focus trong 1 input/textarea
      if (document.activeElement.tagName === 'INPUT' ||
          document.activeElement.tagName === 'TEXTAREA') return;
      e.preventDefault();
      undoLast();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
      // Chỉ khi không đang focus trong input/textarea
      if (document.activeElement.tagName === 'INPUT' ||
          document.activeElement.tagName === 'TEXTAREA') return;
      e.preventDefault();
      const data = load();
      const k = key(selY, selM, selD);
      const tasks = (data[k] || []).filter(t => t.subtasks && t.subtasks.length > 0);
      if (!tasks.length) return;
      // Nếu tất cả đã mở → đóng hết; ngược lại → mở hết
      const allOpen = tasks.every(t => expandedTasks.has(t.id));
      tasks.forEach(t => {
        if (allOpen) expandedTasks.delete(t.id);
        else expandedTasks.add(t.id);
      });
      renderTodos();
    }
  });

  // (Public version — no cloud sync)
})();
</script>

<!-- MOVE/COPY MODAL -->

  <div class="modal-box">
    <div class="modal-title">Copy or Move tasks</div>
    <div class="modal-sub" id="moveModalSub"></div>
    <input type="date" id="moveTargetDate">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeMoveModal()">Cancel</button>
      <button class="btn-copy" onclick="executeMoveOrCopy('copy')">📋 Copy to date</button>
      <button class="btn-move" onclick="executeMoveOrCopy('move')">✂️ Move to date</button>
    </div>
  </div>
</div>
